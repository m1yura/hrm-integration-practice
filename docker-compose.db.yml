version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hrm-postgres
    environment:
      POSTGRES_DB: hrm_db
      POSTGRES_USER: hrm_user
      POSTGRES_PASSWORD: hrm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrm_user -d hrm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
